name: Full-stack e2e

# Boots PDI + QRME + JIM-mini as three separate containers (docker/) and runs
# the cross-service end-to-end flow (docker/e2e.py) over real HTTP seams — the
# booted-services counterpart to the in-process tandem tests.
#
# Runs on main and on demand (not per-PR). It checks out the two sibling
# repositories alongside this one; all three are public, so the built-in
# GITHUB_TOKEN clones them — no extra secret required. The fast per-PR checks
# stay in ci.yml (pytest + front-end smoke build).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: qrme
      - uses: actions/checkout@v4
        with:
          repository: davidsbianchi1984/jim-mini
          path: jim-mini
      - uses: actions/checkout@v4
        with:
          repository: davidsbianchi1984/pdi
          path: pdi

      - name: Boot the suite and run the end-to-end flow
        working-directory: qrme
        run: >
          docker compose -f docker/docker-compose.yml up --build
          --abort-on-container-exit --exit-code-from e2e

      - name: Tear down
        if: always()
        working-directory: qrme
        run: docker compose -f docker/docker-compose.yml down -v
