name: Full-stack e2e

# Boots PDI + QRME + JIM-mini as three separate containers (docker/) and runs
# the cross-service end-to-end flow (docker/e2e.py) over real HTTP seams — the
# booted-services counterpart to the in-process tandem tests.
#
# Runs on main and on demand (not per-PR). It checks out the two sibling
# repositories alongside this one; all three are public, so the built-in
# GITHUB_TOKEN clones them — no extra secret required. The fast per-PR checks
# stay in ci.yml (pytest + front-end smoke build).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # a stuck compose must fail fast, never hang the runner
    steps:
      - uses: actions/checkout@v4
        with:
          path: qrme
      - uses: actions/checkout@v4
        with:
          repository: davidsbianchi1984/jim-mini
          path: jim-mini
      - uses: actions/checkout@v4
        with:
          repository: davidsbianchi1984/pdi
          path: pdi

      # Bring up the long-running services (pdi, qrme, jim) — `bootstrap` runs
      # to completion first as qrme's dependency — then run the e2e flow as a
      # one-shot that exits with the flow's status. Avoids
      # `--abort-on-container-exit`, which deadlocks with the one-shot bootstrap.
      - name: Boot the suite
        working-directory: qrme
        run: docker compose -f docker/docker-compose.yml up -d --build pdi qrme jim

      - name: Run the end-to-end flow
        working-directory: qrme
        run: docker compose -f docker/docker-compose.yml run --rm --build e2e

      - name: Dump logs on failure
        if: failure()
        working-directory: qrme
        run: docker compose -f docker/docker-compose.yml logs --no-color

      - name: Tear down
        if: always()
        working-directory: qrme
        run: docker compose -f docker/docker-compose.yml down -v
