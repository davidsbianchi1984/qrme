<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 700" width="1300" height="700" font-family="Helvetica, Arial, sans-serif">
  <title>Aging and lifecycle — the profile and its companion grow together over time</title>
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2A2438"/>
      <stop offset="0.5" stop-color="#23255F"/>
      <stop offset="1" stop-color="#1B2A55"/>
    </linearGradient>
    <radialGradient id="halo9" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#E8A34D" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1300" height="700" fill="url(#bg9)"/>

  <!-- gentle arc -->
  <path d="M120 500 Q650 260 1180 500" fill="none" stroke="#C9CDD8" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="2 12"/>

  <!-- chronological markers -->
  <g fill="#E8A34D">
    <circle cx="260" cy="452" r="6"/><circle cx="650" cy="320" r="6"/><circle cx="1040" cy="452" r="6"/>
  </g>
  <g fill="#C9CDD8" font-size="14" text-anchor="middle" opacity="0.85">
    <text x="260" y="640">year 1</text>
    <text x="650" y="640">year 8</text>
    <text x="1040" y="640">year 16</text>
  </g>

  <!-- Stage 1: profile with young child -->
  <g transform="translate(260 360)">
    <circle cx="0" cy="0" r="88" fill="url(#halo9)"/>
    <circle cx="-20" cy="-16" r="30" fill="#E8A34D"/>
    <path d="M-66 68 C-66 20 -46 0 -20 0 C6 0 26 20 26 68 Z" fill="#E8A34D" opacity="0.9"/>
    <!-- small child -->
    <circle cx="62" cy="26" r="16" fill="#C9CDD8"/>
    <path d="M40 74 C40 48 50 40 62 40 C74 40 84 48 84 74 Z" fill="#C9CDD8"/>
    <!-- playful bubble -->
    <g transform="translate(-118 -150)">
      <rect width="150" height="52" rx="24" fill="#E8A34D" opacity="0.92"/>
      <text x="75" y="32" text-anchor="middle" fill="#161840" font-size="13">"Once upon a time…"</text>
    </g>
    <text x="0" y="150" text-anchor="middle" fill="#C9CDD8" font-size="14">storyteller</text>
  </g>

  <!-- Stage 2: profile with teenager -->
  <g transform="translate(650 226)">
    <circle cx="0" cy="0" r="92" fill="url(#halo9)"/>
    <circle cx="-22" cy="-18" r="30" fill="#E8A34D"/>
    <path d="M-68 70 C-68 20 -48 0 -22 0 C4 0 24 20 24 70 Z" fill="#E8A34D" opacity="0.9"/>
    <circle cx="64" cy="10" r="20" fill="#C9CDD8"/>
    <path d="M36 78 C36 42 48 28 64 28 C80 28 92 42 92 78 Z" fill="#C9CDD8"/>
    <g transform="translate(-130 -152)">
      <rect width="170" height="52" rx="16" fill="#F4EFE4"/>
      <text x="85" y="32" text-anchor="middle" fill="#2A2438" font-size="13">"How was the exam?"</text>
    </g>
    <text x="0" y="150" text-anchor="middle" fill="#C9CDD8" font-size="14">mentor</text>
  </g>

  <!-- Stage 3: profile with young adult -->
  <g transform="translate(1040 360)">
    <circle cx="0" cy="0" r="96" fill="url(#halo9)"/>
    <circle cx="-24" cy="-20" r="30" fill="#E8A34D"/>
    <path d="M-70 72 C-70 20 -50 0 -24 0 C2 0 22 20 22 72 Z" fill="#E8A34D" opacity="0.9"/>
    <circle cx="64" cy="-6" r="24" fill="#C9CDD8"/>
    <path d="M32 80 C32 38 46 16 64 16 C82 16 96 38 96 80 Z" fill="#C9CDD8"/>
    <g transform="translate(-150 -156)">
      <rect width="200" height="52" rx="12" fill="#C9CDD8"/>
      <text x="100" y="32" text-anchor="middle" fill="#161840" font-size="13">"Proud of you. Call anytime."</text>
    </g>
    <text x="0" y="152" text-anchor="middle" fill="#C9CDD8" font-size="14">confidant</text>
  </g>

  <!-- evolving environment hints -->
  <g opacity="0.25" stroke="#C9CDD8" stroke-width="2" fill="none">
    <path d="M150 560 q20 -34 40 0" />
    <path d="M600 560 h100 v-26 h-100 z"/>
    <rect x="1000" y="520" width="34" height="40"/>
    <rect x="1044" y="500" width="34" height="60"/>
  </g>
</svg>
