<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 700" width="1300" height="700" font-family="Helvetica, Arial, sans-serif">
  <title>Aging and lifecycle — the profile and its companion grow together over time</title>
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#101235"/>
      <stop offset="0.5" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#2B2D6E"/>
    </linearGradient>
    <radialGradient id="avign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="aspring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCE8D0"/><stop offset="1" stop-color="#9DBF8E"/>
    </linearGradient>
    <linearGradient id="asummer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5C57F"/><stop offset="1" stop-color="#E8A34D"/>
    </linearGradient>
    <linearGradient id="aautumn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0A98A"/><stop offset="1" stop-color="#B97B52"/>
    </linearGradient>
    <linearGradient id="awinter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DDE1EC"/><stop offset="1" stop-color="#9BA1BC"/>
    </linearGradient>
    <filter id="asoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="ashadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#05061C" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1300" height="700" fill="url(#abg)"/>

  <text x="650" y="64" text-anchor="middle" font-size="30" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">Profiles that grow with you</text>
  <text x="650" y="92" text-anchor="middle" font-size="15" fill="#8B90A8">Appearance, voice, and concerns shift along a configured lifecycle</text>

  <!-- time arc -->
  <path d="M120 520 Q650 360 1180 520" fill="none" stroke="#C9CDD8" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="1 11" stroke-linecap="round"/>

  <!-- ===== four ages ===== -->
  <!-- young -->
  <g transform="translate(220 470)">
    <g filter="url(#asoft)"><circle cy="-40" r="60" fill="#9DBF8E" opacity="0.35"/></g>
    <g filter="url(#ashadow)">
      <circle cy="-64" r="34" fill="url(#aspring)"/>
      <path d="M-46 66 C-46 -14 -24 -34 0 -34 C24 -34 46 -14 46 66 Z" fill="url(#aspring)"/>
    </g>
    <circle cy="-64" r="42" fill="none" stroke="#DCE8D0" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="2 8"/>
    <text y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="#DCE8D0">20s</text>
    <text y="122" text-anchor="middle" font-size="11.5" fill="#8B90A8">quick, playful, plans ahead</text>
  </g>

  <!-- adult -->
  <g transform="translate(510 430)">
    <g filter="url(#asoft)"><circle cy="-40" r="66" fill="#E8A34D" opacity="0.4"/></g>
    <g filter="url(#ashadow)">
      <circle cy="-70" r="37" fill="url(#asummer)"/>
      <path d="M-50 70 C-50 -14 -26 -36 0 -36 C26 -36 50 -14 50 70 Z" fill="url(#asummer)"/>
    </g>
    <circle cy="-70" r="46" fill="none" stroke="#F5C57F" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="2 8"/>
    <text y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#F5C57F">40s</text>
    <text y="128" text-anchor="middle" font-size="11.5" fill="#8B90A8">steady, storied, mentoring</text>
  </g>

  <!-- older -->
  <g transform="translate(800 430)">
    <g filter="url(#asoft)"><circle cy="-40" r="62" fill="#B97B52" opacity="0.4"/></g>
    <g filter="url(#ashadow)">
      <circle cy="-66" r="35" fill="url(#aautumn)"/>
      <path d="M-48 68 C-48 -14 -25 -34 0 -34 C25 -34 48 -14 48 68 Z" fill="url(#aautumn)"/>
    </g>
    <circle cy="-66" r="44" fill="none" stroke="#E0A98A" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="2 8"/>
    <text y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#E0A98A">60s</text>
    <text y="126" text-anchor="middle" font-size="11.5" fill="#8B90A8">slower cadence, deeper recall</text>
  </g>

  <!-- elder -->
  <g transform="translate(1080 470)">
    <g filter="url(#asoft)"><circle cy="-40" r="58" fill="#C9CDD8" opacity="0.35"/></g>
    <g filter="url(#ashadow)">
      <circle cy="-62" r="33" fill="url(#awinter)"/>
      <path d="M-45 64 C-45 -12 -23 -32 0 -32 C23 -32 45 -12 45 64 Z" fill="url(#awinter)"/>
    </g>
    <circle cy="-62" r="41" fill="none" stroke="#DDE1EC" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="2 8"/>
    <text y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#DDE1EC">80s</text>
    <text y="120" text-anchor="middle" font-size="11.5" fill="#8B90A8">gentle, reflective, legacy-minded</text>
  </g>

  <!-- arc waypoints -->
  <g fill="#E8A34D">
    <circle cx="220" cy="490" r="4"/><circle cx="510" cy="446" r="4"/>
    <circle cx="800" cy="446" r="4"/><circle cx="1080" cy="490" r="4"/>
  </g>

  <!-- config chip -->
  <g transform="translate(505 592)" filter="url(#ashadow)">
    <rect width="290" height="52" rx="26" fill="#12143B"/>
    <rect width="290" height="52" rx="26" fill="none" stroke="#3A3D7E" stroke-width="1.4"/>
    <circle cx="30" cy="26" r="8" fill="#E8A34D"/>
    <text x="50" y="24" font-size="13" fill="#F4E3C8" font-weight="bold">aging: real-time</text>
    <text x="50" y="41" font-size="11" fill="#8B90A8">or fixed-age · owner-configured</text>
  </g>

  <rect width="1300" height="700" fill="url(#avign)"/>
</svg>
