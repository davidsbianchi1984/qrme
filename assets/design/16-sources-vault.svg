<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 680" width="1300" height="680" font-family="Helvetica, Arial, sans-serif">
  <title>QRME source material — your story builds the profile, sealed in the PDI vault</title>
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#12143B"/>
      <stop offset="0.5" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#141639"/>
    </linearGradient>
    <radialGradient id="vvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="vcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2C63"/>
      <stop offset="1" stop-color="#1E2050"/>
    </linearGradient>
    <radialGradient id="vcore" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0" stop-color="#FFF6E6" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#F0C482" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
    <filter id="vshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="vsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
    <marker id="varrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M1 1 L8.5 5 L1 9 Z" fill="#E8A34D"/>
    </marker>
  </defs>

  <rect width="1300" height="680" fill="url(#vbg)"/>

  <text x="650" y="58" text-anchor="middle" font-size="28" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">Your story builds the profile</text>
  <text x="650" y="86" text-anchor="middle" font-size="14.5" fill="#8B90A8">Photos, writings, voice, life events — recalled naturally, sealed at rest, deleted on your word</text>

  <!-- ===== source chips (left) ===== -->
  <g filter="url(#vshadow)" font-size="12">
    <g transform="translate(80 140)">
      <rect width="200" height="46" rx="14" fill="url(#vcard)" stroke="#E8A34D" stroke-opacity="0.45" stroke-width="1.2"/>
      <circle cx="24" cy="23" r="8" fill="#E8A34D"/>
      <text x="44" y="28" fill="#C9CDD8">photos &amp; media</text>
    </g>
    <g transform="translate(80 198)">
      <rect width="200" height="46" rx="14" fill="url(#vcard)" stroke="#C9CDD8" stroke-opacity="0.35" stroke-width="1.2"/>
      <circle cx="24" cy="23" r="8" fill="#DDE1EC"/>
      <text x="44" y="28" fill="#C9CDD8">conversations</text>
    </g>
    <g transform="translate(80 256)">
      <rect width="200" height="46" rx="14" fill="url(#vcard)" stroke="#9FD8E8" stroke-opacity="0.45" stroke-width="1.2"/>
      <circle cx="24" cy="23" r="8" fill="#9FD8E8"/>
      <text x="44" y="28" fill="#C9CDD8">social posts</text>
    </g>
    <g transform="translate(80 314)">
      <rect width="200" height="46" rx="14" fill="url(#vcard)" stroke="#DCB8D4" stroke-opacity="0.45" stroke-width="1.2"/>
      <circle cx="24" cy="23" r="8" fill="#DCB8D4"/>
      <text x="44" y="28" fill="#C9CDD8">writings &amp; voice notes</text>
    </g>
    <g transform="translate(80 372)">
      <rect width="200" height="46" rx="14" fill="url(#vcard)" stroke="#B8D8C8" stroke-opacity="0.45" stroke-width="1.2"/>
      <circle cx="24" cy="23" r="8" fill="#B8D8C8"/>
      <text x="44" y="28" fill="#C9CDD8">life events</text>
    </g>
    <g transform="translate(80 430)">
      <rect width="200" height="46" rx="14" fill="url(#vcard)" stroke="#A9C4E8" stroke-opacity="0.45" stroke-width="1.2"/>
      <circle cx="24" cy="23" r="8" fill="#A9C4E8"/>
      <text x="44" y="28" fill="#C9CDD8">knowledge &amp; linked accounts</text>
    </g>
  </g>
  <text x="180" y="510" text-anchor="middle" font-size="11.5" fill="#8B90A8">POST /profiles/{id}/sources</text>

  <!-- flows: chips → profile -->
  <g fill="none" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.8" stroke-linecap="round">
    <path d="M280 168 C400 200 460 240 520 272" marker-end="url(#varrow)"/>
    <path d="M280 300 C390 306 450 308 512 312" marker-end="url(#varrow)"/>
    <path d="M280 448 C400 420 460 380 520 350" marker-end="url(#varrow)"/>
  </g>

  <!-- ===== profile core (center) ===== -->
  <g transform="translate(620 315)">
    <g filter="url(#vsoft)"><circle r="86" fill="#E8A34D" opacity="0.4"/></g>
    <circle r="112" fill="url(#vcore)"/>
    <circle r="74" fill="none" stroke="#F4E3C8" stroke-opacity="0.45" stroke-width="1.4"/>
    <circle r="92" fill="none" stroke="#E8A34D" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 9"/>
    <circle cy="-18" r="27" fill="#F5C57F"/>
    <path d="M-42 60 C-42 14 -22 -4 0 -4 C22 -4 42 14 42 60 Z" fill="#F5C57F"/>
    <text y="100" text-anchor="middle" font-size="13.5" fill="#F4E3C8" font-weight="bold">Dana — synthetic profile</text>
    <text y="120" text-anchor="middle" font-size="11" fill="#8B90A8">recalls source material naturally in every reply</text>
  </g>

  <!-- recall bubble -->
  <g transform="translate(760 130)" filter="url(#vshadow)">
    <rect width="330" height="86" rx="16" fill="url(#vcard)"/>
    <path d="M40 86 L52 100 L62 86 Z" fill="url(#vcard)"/>
    <rect width="330" height="86" rx="16" fill="none" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="20" y="30" font-size="12.5" fill="#F4E3C8" font-weight="bold">Recalled, not retrieved-sounding:</text>
    <text x="20" y="53" font-size="12" fill="#C9CDD8">“That volcano photo from '89 — your mom's</text>
    <text x="20" y="71" font-size="12" fill="#C9CDD8">hair never recovered from the baking soda.”</text>
  </g>

  <!-- ===== vault (right) ===== -->
  <g transform="translate(1080 360)">
    <g filter="url(#vsoft)"><circle r="90" fill="#5FA8C0" opacity="0.28"/></g>
    <circle r="92" fill="#1B1D4E" stroke="#8B90A8" stroke-opacity="0.6" stroke-width="2" filter="url(#vshadow)"/>
    <circle r="70" fill="#171A46"/>
    <circle r="52" fill="none" stroke="#DDE1EC" stroke-opacity="0.55" stroke-width="6"/>
    <g stroke="#DDE1EC" stroke-opacity="0.6" stroke-width="6" stroke-linecap="round">
      <line y1="-40" y2="40"/><line x1="-40" x2="40"/>
    </g>
    <circle r="20" fill="#12143B" stroke="#E8A34D" stroke-width="2"/>
    <g>
      <rect x="-7" y="-2" width="14" height="12" rx="3" fill="#E8A34D"/>
      <path d="M-4.5 -2 v-4 a4.5 4.5 0 0 1 9 0 v4" fill="none" stroke="#E8A34D" stroke-width="2.6"/>
    </g>
    <text y="120" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#9FD8E8">PDI vault — AES-256-GCM</text>
    <text y="140" text-anchor="middle" font-size="11" fill="#8B90A8">content sealed; QRME keeps only the key</text>
  </g>
  <path d="M740 340 C860 350 940 354 984 356" fill="none" stroke="#9FD8E8" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="2 7" stroke-linecap="round"/>
  <g transform="translate(862 330)" font-family="Courier New, monospace" font-size="10">
    <rect x="-8" y="-14" width="180" height="24" rx="7" fill="#0D0F30"/>
    <text fill="#9FD8E8" y="2">qrme/prf_…/sources/src_…</text>
  </g>

  <!-- control footer -->
  <g transform="translate(650 636)" text-anchor="middle" filter="url(#vshadow)">
    <rect x="-420" y="-26" width="840" height="46" rx="23" fill="#12143B"/>
    <rect x="-420" y="-26" width="840" height="46" rx="23" fill="none" stroke="#3A3D7E" stroke-width="1.4"/>
    <text y="3" font-size="12.5" fill="#C9CDD8">You own it: PATCH to edit · GET /export takes everything with you · DELETE erases the profile and purges the vault</text>
  </g>

  <rect width="1300" height="680" fill="url(#vvign)"/>
</svg>
