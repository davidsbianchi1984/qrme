<svg role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 700" width="1300" height="700" font-family="Helvetica, Arial, sans-serif">
  <title id="t">QRME profile health — the stats dashboard and the maturity dial</title>
  <desc id="d">QRME profile health — the stats dashboard and the maturity dial. Hand-built vector illustration from the QRME product family design system.</desc>
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191B47"/>
      <stop offset="1" stop-color="#0F1136"/>
    </linearGradient>
    <radialGradient id="wvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="wcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2C63"/>
      <stop offset="1" stop-color="#1E2050"/>
    </linearGradient>
    <linearGradient id="wbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3A3D7E"/>
      <stop offset="1" stop-color="#7BC47F"/>
    </linearGradient>
    <linearGradient id="wdial" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D96A6A"/>
      <stop offset="0.5" stop-color="#E8C34D"/>
      <stop offset="1" stop-color="#7BC47F"/>
    </linearGradient>
    <filter id="wshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="wsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1300" height="700" fill="url(#wbg)"/>

  <text x="650" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">Profile health, at a glance</text>
  <text x="650" y="88" text-anchor="middle" font-size="14.5" fill="#8B90A8">GET /profiles/{id}/stats — plus the maturity dial that shapes every reply</text>

  <!-- ===== dashboard panel ===== -->
  <g transform="translate(80 130)" filter="url(#wshadow)">
    <rect width="700" height="440" rx="22" fill="#171A46"/>
    <rect width="700" height="440" rx="22" fill="none" stroke="#3A3D7E" stroke-width="1.6"/>
    <text x="34" y="48" font-size="17" font-weight="bold" fill="#F4E3C8">AI Profile Activity</text>
    <text x="34" y="72" font-size="12" fill="#8B90A8">Dana · legacy_memorial</text>

    <!-- engagement headline + bars -->
    <text x="34" y="140" font-size="44" font-weight="bold" fill="#7BC47F">+24%</text>
    <text x="34" y="166" font-size="12.5" fill="#8B90A8">engagement this month</text>
    <g transform="translate(34 300)">
      <rect x="0" y="-44" width="26" height="44" rx="5" fill="url(#wbar)" opacity="0.45"/>
      <rect x="36" y="-58" width="26" height="58" rx="5" fill="url(#wbar)" opacity="0.55"/>
      <rect x="72" y="-50" width="26" height="50" rx="5" fill="url(#wbar)" opacity="0.65"/>
      <rect x="108" y="-72" width="26" height="72" rx="5" fill="url(#wbar)" opacity="0.75"/>
      <rect x="144" y="-84" width="26" height="84" rx="5" fill="url(#wbar)" opacity="0.85"/>
      <rect x="180" y="-104" width="26" height="104" rx="5" fill="url(#wbar)"/>
      <path d="M8 -50 L48 -66 L84 -58 L120 -80 L156 -92 L192 -112" fill="none" stroke="#BFEAC8" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="192" cy="-112" r="4.5" fill="#BFEAC8"/>
    </g>

    <!-- stat tiles -->
    <g font-size="12.5">
      <g transform="translate(300 96)">
        <rect width="366" height="56" rx="14" fill="url(#wcard)"/>
        <circle cx="28" cy="28" r="11" fill="#A9C4E8" opacity="0.85"/>
        <text x="52" y="25" fill="#C9CDD8">Sessions</text>
        <text x="52" y="44" fill="#8B90A8" font-size="10.5">sum across interactors</text>
        <text x="338" y="34" text-anchor="end" font-size="19" font-weight="bold" fill="#F4E3C8">38</text>
      </g>
      <g transform="translate(300 162)">
        <rect width="366" height="56" rx="14" fill="url(#wcard)"/>
        <circle cx="28" cy="28" r="11" fill="#DCB8D4" opacity="0.85"/>
        <text x="52" y="25" fill="#C9CDD8">Memory entries</text>
        <text x="52" y="44" fill="#8B90A8" font-size="10.5">turns remembered per person</text>
        <text x="338" y="34" text-anchor="end" font-size="19" font-weight="bold" fill="#F4E3C8">1,204</text>
      </g>
      <g transform="translate(300 228)">
        <rect width="366" height="56" rx="14" fill="url(#wcard)"/>
        <circle cx="28" cy="28" r="11" fill="#E8A34D" opacity="0.9"/>
        <text x="52" y="25" fill="#C9CDD8">Moderation pass rate</text>
        <text x="52" y="44" fill="#8B90A8" font-size="10.5">every reply reviewed first</text>
        <text x="338" y="34" text-anchor="end" font-size="19" font-weight="bold" fill="#7BC47F">99.2%</text>
      </g>
      <g transform="translate(300 294)">
        <rect width="366" height="56" rx="14" fill="url(#wcard)"/>
        <circle cx="28" cy="28" r="11" fill="#9FD8E8" opacity="0.85"/>
        <text x="52" y="25" fill="#C9CDD8">Relationship graph</text>
        <text x="52" y="44" fill="#8B90A8" font-size="10.5">people with a tuned relationship</text>
        <text x="338" y="34" text-anchor="end" font-size="19" font-weight="bold" fill="#F4E3C8">12</text>
      </g>
      <g transform="translate(300 360)">
        <rect width="366" height="56" rx="14" fill="url(#wcard)"/>
        <circle cx="28" cy="28" r="11" fill="#B8D8C8" opacity="0.85"/>
        <text x="52" y="25" fill="#C9CDD8">Sources · posts · surfaces</text>
        <text x="52" y="44" fill="#8B90A8" font-size="10.5">material in, voice out, everywhere live</text>
        <text x="338" y="34" text-anchor="end" font-size="19" font-weight="bold" fill="#F4E3C8">27 · 9 · 4</text>
      </g>
    </g>
  </g>

  <!-- ===== maturity dial panel ===== -->
  <g transform="translate(830 130)" filter="url(#wshadow)">
    <rect width="390" height="260" rx="22" fill="#171A46"/>
    <rect width="390" height="260" rx="22" fill="none" stroke="#3A3D7E" stroke-width="1.6"/>
    <text x="30" y="46" font-size="16" font-weight="bold" fill="#F4E3C8">Age &amp; maturity filter</text>
    <text x="30" y="68" font-size="11.5" fill="#8B90A8">context-appropriate, always</text>
    <!-- shield -->
    <g transform="translate(330 52)">
      <path d="M0 -22 L18 -14 V4 C18 18 9 27 0 31 C-9 27 -18 18 -18 4 V-14 Z" fill="#23255C" stroke="#E8A34D" stroke-width="1.8"/>
      <text y="8" text-anchor="middle" font-size="11" font-weight="bold" fill="#E8A34D">18+</text>
    </g>
    <!-- dial track -->
    <g transform="translate(30 150)">
      <rect width="330" height="8" rx="4" fill="url(#wdial)" opacity="0.85"/>
      <circle cx="165" cy="4" r="13" fill="#F4E3C8" stroke="#12143B" stroke-width="3"/>
      <g font-size="11.5" text-anchor="middle">
        <text x="18" y="34" fill="#D96A6A" font-weight="bold">strict</text>
        <text x="165" y="34" fill="#E8C34D" font-weight="bold">balanced</text>
        <text x="318" y="34" fill="#7BC47F" font-weight="bold">open</text>
      </g>
    </g>
    <g font-size="11" fill="#8B90A8">
      <text x="30" y="216">minors are always held to strict ·</text>
      <text x="30" y="234">strict filters flagged content for adults too</text>
    </g>
  </g>

  <!-- ===== compose/multimodal strip ===== -->
  <g transform="translate(830 420)" filter="url(#wshadow)">
    <rect width="390" height="150" rx="22" fill="#171A46"/>
    <rect width="390" height="150" rx="22" fill="none" stroke="#3A3D7E" stroke-width="1.6"/>
    <text x="30" y="42" font-size="16" font-weight="bold" fill="#F4E3C8">Multi-modal output</text>
    <g transform="translate(30 66)">
      <g>
        <rect width="76" height="50" rx="12" fill="url(#wcard)" stroke="#C9CDD8" stroke-opacity="0.3"/>
        <text x="38" y="31" text-anchor="middle" font-size="19" font-weight="bold" fill="#C9CDD8">T</text>
      </g>
      <g transform="translate(86 0)">
        <rect width="76" height="50" rx="12" fill="url(#wcard)" stroke="#E8A34D" stroke-opacity="0.6"/>
        <g transform="translate(38 25)" stroke="#E8A34D" stroke-width="2.4" stroke-linecap="round">
          <line x1="-12" y1="-5" x2="-12" y2="5"/><line x1="-4" y1="-11" x2="-4" y2="11"/>
          <line x1="4" y1="-7" x2="4" y2="7"/><line x1="12" y1="-3" x2="12" y2="3"/>
        </g>
      </g>
      <g transform="translate(172 0)">
        <rect width="76" height="50" rx="12" fill="url(#wcard)" stroke="#9FD8E8" stroke-opacity="0.5"/>
        <g transform="translate(38 25)">
          <circle r="9" fill="none" stroke="#9FD8E8" stroke-width="2"/>
          <circle cx="-3" cy="-2" r="2" fill="#9FD8E8"/>
          <path d="M-7 6 L-1 0 L3 4 L7 -1" fill="none" stroke="#9FD8E8" stroke-width="1.6" stroke-linecap="round"/>
        </g>
      </g>
      <g transform="translate(258 0)">
        <rect width="76" height="50" rx="12" fill="url(#wcard)" stroke="#DCB8D4" stroke-opacity="0.5"/>
        <path d="M-8 -9 L10 0 L-8 9 Z" transform="translate(38 25)" fill="#DCB8D4"/>
      </g>
    </g>
    <text x="30" y="138" font-size="10.5" fill="#8B90A8">voice replies report their basis — “preserved from 2 voice-note sources”</text>
  </g>

  <rect width="1300" height="700" fill="url(#wvign)"/>
</svg>
