<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" width="1400" height="640" font-family="Helvetica, Arial, sans-serif">
  <title>QRME onboarding — profile creation flow across four mobile screens</title>
  <defs>
    <linearGradient id="obg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#0F1136"/>
    </linearGradient>
    <linearGradient id="oscreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E3170"/>
      <stop offset="1" stop-color="#20224F"/>
    </linearGradient>
    <linearGradient id="obody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A3D7E"/>
      <stop offset="1" stop-color="#181A44"/>
    </linearGradient>
    <radialGradient id="ovign" cx="0.5" cy="0.5" r="0.78">
      <stop offset="0.66" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="oshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#05061C" flood-opacity="0.6"/>
    </filter>
    <filter id="oglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1400" height="640" fill="url(#obg)"/>
  <ellipse cx="700" cy="640" rx="760" ry="140" fill="#E8A34D" opacity="0.06"/>

  <text x="700" y="66" text-anchor="middle" font-size="30" font-weight="bold" fill="#F4E3C8" letter-spacing="2">Create a profile in four steps</text>

  <!-- progress rail -->
  <g>
    <line x1="255" y1="112" x2="1145" y2="112" stroke="#3A3D7E" stroke-width="3"/>
    <line x1="255" y1="112" x2="1145" y2="112" stroke="#E8A34D" stroke-width="3" stroke-dasharray="6 8" stroke-opacity="0.6"/>
    <g text-anchor="middle" font-size="15" font-weight="bold">
      <g><circle cx="255" cy="112" r="16" fill="#E8A34D"/><text x="255" y="117" fill="#161840">1</text></g>
      <g><circle cx="552" cy="112" r="16" fill="#E8A34D"/><text x="552" y="117" fill="#161840">2</text></g>
      <g><circle cx="848" cy="112" r="16" fill="#E8A34D"/><text x="848" y="117" fill="#161840">3</text></g>
      <g><circle cx="1145" cy="112" r="16" fill="#E8A34D"/><text x="1145" y="117" fill="#161840">4</text></g>
    </g>
  </g>

  <!-- ============ four phones ============ -->
  <!-- phone 1: identity -->
  <g transform="translate(160 160)">
    <rect width="190" height="400" rx="26" fill="url(#obody)" filter="url(#oshadow)"/>
    <rect x="7" y="7" width="176" height="386" rx="20" fill="url(#oscreen)"/>
    <rect x="66" y="16" width="58" height="6" rx="3" fill="#12143B"/>
    <text x="95" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#F4E3C8">Identity</text>
    <circle cx="95" cy="120" r="34" fill="#E8A34D" opacity="0.9"/>
    <circle cx="95" cy="108" r="13" fill="#1B1D4E"/>
    <path d="M72 146 C72 126 82 120 95 120 C108 120 118 126 118 146 Z" fill="#1B1D4E"/>
    <circle cx="95" cy="120" r="42" fill="none" stroke="#F4E3C8" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="2 7"/>
    <g fill="#2A2C63" stroke="#4A4E96" stroke-width="1">
      <rect x="27" y="184" width="136" height="30" rx="8"/>
      <rect x="27" y="226" width="136" height="30" rx="8"/>
      <rect x="27" y="268" width="136" height="52" rx="8"/>
    </g>
    <g fill="#8B90A8" font-size="11">
      <text x="36" y="203">Name · Dana</text>
      <text x="36" y="245">Voice · warm, wry</text>
      <text x="36" y="287">Backstory…</text>
    </g>
    <rect x="27" y="338" width="136" height="34" rx="17" fill="#E8A34D"/>
    <text x="95" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#161840">Continue</text>
  </g>

  <!-- phone 2: relationships -->
  <g transform="translate(457 160)">
    <rect width="190" height="400" rx="26" fill="url(#obody)" filter="url(#oshadow)"/>
    <rect x="7" y="7" width="176" height="386" rx="20" fill="url(#oscreen)"/>
    <rect x="66" y="16" width="58" height="6" rx="3" fill="#12143B"/>
    <text x="95" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#F4E3C8">Relationships</text>
    <!-- mini graph -->
    <g>
      <circle cx="95" cy="130" r="17" fill="#E8A34D"/>
      <circle cx="45" cy="200" r="12" fill="#C9CDD8"/>
      <circle cx="95" cy="216" r="12" fill="#C9CDD8" opacity="0.8"/>
      <circle cx="145" cy="200" r="12" fill="#C9CDD8" opacity="0.6"/>
      <g stroke-linecap="round" fill="none">
        <path d="M84 143 L52 190" stroke="#E8A34D" stroke-width="3"/>
        <path d="M95 147 L95 204" stroke="#F4E3C8" stroke-width="2" stroke-opacity="0.7"/>
        <path d="M106 143 L138 190" stroke="#C9CDD8" stroke-width="1.4" stroke-dasharray="3 5" stroke-opacity="0.7"/>
      </g>
    </g>
    <g font-size="10" fill="#8B90A8" text-anchor="middle">
      <text x="45" y="228">family</text><text x="95" y="244">friend</text><text x="145" y="228">public</text>
    </g>
    <g fill="#2A2C63" stroke="#4A4E96" stroke-width="1">
      <rect x="27" y="262" width="136" height="26" rx="8"/>
      <rect x="27" y="296" width="136" height="26" rx="8"/>
    </g>
    <g fill="#8B90A8" font-size="11">
      <text x="36" y="279">Tone per circle</text>
      <text x="36" y="313">Sharing rules</text>
    </g>
    <rect x="27" y="338" width="136" height="34" rx="17" fill="#E8A34D"/>
    <text x="95" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#161840">Continue</text>
  </g>

  <!-- phone 3: memory & privacy -->
  <g transform="translate(753 160)">
    <rect width="190" height="400" rx="26" fill="url(#obody)" filter="url(#oshadow)"/>
    <rect x="7" y="7" width="176" height="386" rx="20" fill="url(#oscreen)"/>
    <rect x="66" y="16" width="58" height="6" rx="3" fill="#12143B"/>
    <text x="95" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#F4E3C8">Memory &amp; privacy</text>
    <!-- memory spiral -->
    <g fill="none" stroke="#E8A34D" stroke-linecap="round">
      <path d="M95 140 m-30 0 a30 30 0 1 1 60 0 a30 30 0 0 1 -46 25" stroke-width="2.4" stroke-opacity="0.85"/>
      <path d="M95 140 m-42 0 a42 42 0 1 1 84 0" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="2 7"/>
    </g>
    <circle cx="95" cy="140" r="5" fill="#F4E3C8"/>
    <!-- toggles -->
    <g>
      <g transform="translate(27 206)">
        <text font-size="11" fill="#8B90A8" y="14">Remember chats</text>
        <rect x="106" width="30" height="17" rx="8.5" fill="#E8A34D"/><circle cx="128" cy="8.5" r="6.5" fill="#161840"/>
      </g>
      <g transform="translate(27 238)">
        <text font-size="11" fill="#8B90A8" y="14">Share across users</text>
        <rect x="106" width="30" height="17" rx="8.5" fill="#3A3D7E"/><circle cx="114" cy="8.5" r="6.5" fill="#8B90A8"/>
      </g>
      <g transform="translate(27 270)">
        <text font-size="11" fill="#8B90A8" y="14">Owner review</text>
        <rect x="106" width="30" height="17" rx="8.5" fill="#E8A34D"/><circle cx="128" cy="8.5" r="6.5" fill="#161840"/>
      </g>
    </g>
    <g transform="translate(27 302)" fill="#2A2C63" stroke="#4A4E96" stroke-width="1">
      <rect width="136" height="24" rx="8"/>
    </g>
    <text x="36" y="318" font-size="11" fill="#8B90A8">Clear / restrict anytime</text>
    <rect x="27" y="338" width="136" height="34" rx="17" fill="#E8A34D"/>
    <text x="95" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#161840">Continue</text>
  </g>

  <!-- phone 4: go live -->
  <g transform="translate(1050 160)">
    <rect width="190" height="400" rx="26" fill="url(#obody)" filter="url(#oshadow)"/>
    <rect x="7" y="7" width="176" height="386" rx="20" fill="url(#oscreen)"/>
    <rect x="66" y="16" width="58" height="6" rx="3" fill="#12143B"/>
    <text x="95" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#F4E3C8">Go live</text>
    <g filter="url(#oglow)"><circle cx="95" cy="150" r="44" fill="#E8A34D" opacity="0.55"/></g>
    <circle cx="95" cy="150" r="38" fill="#E8A34D"/>
    <circle cx="95" cy="137" r="14" fill="#161840"/>
    <path d="M70 178 C70 156 81 150 95 150 C109 150 120 156 120 178 Z" fill="#161840"/>
    <circle cx="95" cy="150" r="50" fill="none" stroke="#F4E3C8" stroke-opacity="0.5" stroke-width="1.4"/>
    <circle cx="95" cy="150" r="60" fill="none" stroke="#E8A34D" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 8"/>
    <g text-anchor="middle">
      <text x="95" y="242" font-size="13" fill="#F4E3C8" font-weight="bold">Dana is live</text>
      <text x="95" y="262" font-size="11" fill="#8B90A8">moderation on · memory on</text>
      <text x="95" y="280" font-size="11" fill="#8B90A8">aging · real-time</text>
    </g>
    <rect x="27" y="338" width="136" height="34" rx="17" fill="#F4E3C8"/>
    <text x="95" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#161840">Meet Dana</text>
  </g>

  <rect width="1400" height="640" fill="url(#ovign)"/>
</svg>
