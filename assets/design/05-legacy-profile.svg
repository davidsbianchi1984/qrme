<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="Georgia, serif">
  <title>Legacy profile — a portrait dissolves into a living avatar talking with a grandchild</title>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2438"/>
      <stop offset="1" stop-color="#161840"/>
    </linearGradient>
    <linearGradient id="rays" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8A34D" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9CBB2"/>
      <stop offset="1" stop-color="#B7A588"/>
    </linearGradient>
    <radialGradient id="avatar5" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#F4E3C8" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#E8A34D" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bg5)"/>
  <path d="M0 0 L520 0 L260 750 L0 750 Z" fill="url(#rays)"/>

  <!-- faint timeline behind -->
  <g opacity="0.3">
    <line x1="120" y1="660" x2="1080" y2="660" stroke="#C9CDD8" stroke-width="1.5" stroke-dasharray="2 10"/>
    <g fill="#E8A34D">
      <circle cx="260" cy="660" r="4"/><circle cx="520" cy="660" r="4"/><circle cx="800" cy="660" r="4"/><circle cx="1040" cy="660" r="4"/>
    </g>
    <g fill="#C9CDD8" font-size="13" text-anchor="middle" font-family="Helvetica, Arial, sans-serif">
      <text x="260" y="690">1948</text><text x="520" y="690">1975</text><text x="800" y="690">2003</text><text x="1040" y="690">now</text>
    </g>
  </g>

  <!-- archival portrait, left -->
  <g transform="translate(150 130)">
    <rect x="-18" y="-18" width="296" height="376" rx="4" fill="#EFE6D4"/>
    <rect width="260" height="340" fill="url(#photo)"/>
    <circle cx="130" cy="120" r="58" fill="#6E6250"/>
    <path d="M42 300 C42 214 84 184 130 184 C176 184 218 214 218 300 Z" fill="#6E6250"/>
    <!-- portrait dissolving into particles toward the avatar -->
    <g fill="#E8A34D">
      <circle cx="250" cy="90" r="5" opacity="0.9"/>
      <circle cx="285" cy="130" r="4" opacity="0.75"/>
      <circle cx="320" cy="105" r="3.5" opacity="0.6"/>
      <circle cx="300" cy="180" r="4.5" opacity="0.7"/>
      <circle cx="345" cy="160" r="3" opacity="0.5"/>
      <circle cx="365" cy="210" r="3.5" opacity="0.45"/>
    </g>
    <g fill="#C9CDD8">
      <circle cx="268" cy="230" r="3" opacity="0.6"/>
      <circle cx="330" cy="250" r="2.5" opacity="0.5"/>
      <circle cx="380" cy="130" r="2.5" opacity="0.4"/>
    </g>
  </g>

  <!-- living avatar, center-right -->
  <g transform="translate(640 120)">
    <circle cx="0" cy="120" r="150" fill="url(#avatar5)"/>
    <circle cx="0" cy="96" r="50" fill="#E8A34D"/>
    <path d="M-74 236 C-74 164 -42 130 0 130 C42 130 74 164 74 236 Z" fill="#E8A34D" opacity="0.9"/>
    <circle cx="0" cy="120" r="150" fill="none" stroke="#F4E3C8" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>

  <!-- grandchild with chat + voice -->
  <g transform="translate(960 320)">
    <circle cx="0" cy="0" r="40" fill="#3A3D80" stroke="#C9CDD8" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M-66 190 C-66 86 -34 52 0 52 C34 52 66 86 66 190 Z" fill="#3A3D80"/>
    <!-- chat bubble -->
    <g transform="translate(-250 -150)" font-family="Helvetica, Arial, sans-serif">
      <rect width="230" height="76" rx="18" fill="#F4EFE4"/>
      <path d="M190 76 l20 20 v-20 z" fill="#F4EFE4"/>
      <text x="24" y="32" fill="#2A2438" font-size="14">"Tell me again about the</text>
      <text x="24" y="54" fill="#2A2438" font-size="14">boat you built, Grandpa."</text>
    </g>
    <!-- voice waves -->
    <g stroke="#E8A34D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8">
      <path d="M-96 10 q-10 -12 0 -24"/>
      <path d="M-112 18 q-16 -20 0 -40"/>
      <path d="M-128 26 q-22 -28 0 -56"/>
    </g>
  </g>
</svg>
