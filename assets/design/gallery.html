<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QRME — Visual Asset Gallery</title>
<style>
  :root { --indigo: #23255F; --dark: #161840; --silver: #C9CDD8; --amber: #E8A34D; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Helvetica, Arial, sans-serif; background: #ECEDF3; color: var(--dark); }
  header { background: linear-gradient(120deg, var(--dark), var(--indigo)); color: #fff; padding: 2.5rem 2rem; }
  header h1 { margin: 0 0 .4rem; font-size: 1.6rem; }
  header p { margin: 0; color: var(--silver); max-width: 60rem; }
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
  figure { margin: 0; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 10px rgba(22,24,64,.10); }
  figure img { display: block; width: 100%; height: 240px; object-fit: cover; background: #fff; }
  figcaption { padding: .9rem 1.1rem 1.1rem; }
  figcaption strong { display: block; margin-bottom: .2rem; }
  figcaption span { color: #6b7086; font-size: .85rem; }
</style>
</head>
<body>
<header>
  <h1>QRME — Visual Asset Gallery</h1>
  <p>Vector concept renditions of the PRD-derived image prompts. Shared palette: deep indigo, soft silver, warm amber. Full prompt text in <code>docs/design/image-prompts.md</code>.</p>
</header>
<main>
  <figure><img src="01-app-icon.svg" alt="App icon"><figcaption><strong>1 · App Icon / Logo Mark</strong><span>Overlapping silhouettes morphing into neural nodes</span></figcaption></figure>
  <figure><img src="02-hero-banner.svg" alt="Hero banner"><figcaption><strong>2 · Hero / Marketing Banner</strong><span>People with luminous avatars linked by relationship threads</span></figcaption></figure>
  <figure><img src="03-onboarding-flow.svg" alt="Onboarding flow"><figcaption><strong>3 · Onboarding — Profile Creation</strong><span>Verification → demographics → sources → persona preview</span></figcaption></figure>
  <figure><img src="04-relationship-aware.svg" alt="Relationship-aware interaction"><figcaption><strong>4 · Relationship-Aware Interaction</strong><span>One profile, different voices per relationship</span></figcaption></figure>
  <figure><img src="05-legacy-profile.svg" alt="Legacy profile"><figcaption><strong>5 · Legacy / Memory Profile</strong><span>A portrait dissolves into a living avatar</span></figcaption></figure>
  <figure><img src="06-engagement-loop.svg" alt="Engagement loop"><figcaption><strong>6 · Engagement-Based Adaptation Loop</strong><span>Signals in, refined responses out — identity fixed</span></figcaption></figure>
  <figure><img src="07-memory-privacy.svg" alt="Memory and privacy"><figcaption><strong>7 · Persistent Memory &amp; Privacy</strong><span>Timeline with view / clear / restrict controls</span></figcaption></figure>
  <figure><img src="08-moderation-pipeline.svg" alt="Moderation pipeline"><figcaption><strong>8 · Content Moderation Pipeline</strong><span>Three filter layers before public visibility</span></figcaption></figure>
  <figure><img src="09-aging-lifecycle.svg" alt="Aging and lifecycle"><figcaption><strong>9 · Aging &amp; Lifecycle</strong><span>Storyteller → mentor → confidant as the child grows</span></figcaption></figure>
  <figure><img src="10-multi-surface.svg" alt="Multi-surface presence"><figcaption><strong>10 · Multi-Surface Presence</strong><span>Chat, feed, web — AR/VR on the roadmap</span></figcaption></figure>
  <figure><img src="11-age-gated-mode.svg" alt="Age-gated mode"><figcaption><strong>11 · Adult Content Mode</strong><span>Verification gate, strongly separated space</span></figcaption></figure>
  <figure><img src="12-persona-set.svg" alt="Persona set"><figcaption><strong>12 · User Persona Set</strong><span>Five personas in one consistent style</span></figcaption></figure>
  <figure><img src="13-guardian-tandem.svg" alt="Guardian tandem"><figcaption><strong>13 · JIM-mini / Guardian</strong><span>Biometrics → detect → trigger specialist → escalate</span></figcaption></figure>
</main>
</body>
</html>
