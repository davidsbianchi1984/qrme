<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>QRME app icon — overlapping silhouettes morphing into neural nodes</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33367C"/>
      <stop offset="0.5" stop-color="#23255F"/>
      <stop offset="1" stop-color="#12143B"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#F4E3C8" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#E8A34D" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.68" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A0B28" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="fig1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DDE1EC"/>
      <stop offset="0.55" stop-color="#AEB3C6"/>
      <stop offset="1" stop-color="#7C819B"/>
    </linearGradient>
    <linearGradient id="fig2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5C57F"/>
      <stop offset="0.55" stop-color="#E8A34D"/>
      <stop offset="1" stop-color="#B36F24"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="228" r="210" fill="url(#halo)"/>

  <!-- faint constellation depth layer -->
  <g fill="#C9CDD8" opacity="0.45">
    <circle cx="88" cy="86" r="2"/><circle cx="150" cy="52" r="1.4"/><circle cx="430" cy="70" r="1.8"/>
    <circle cx="466" cy="150" r="1.4"/><circle cx="60" cy="250" r="1.4"/><circle cx="452" cy="404" r="1.6"/>
  </g>

  <!-- under-glows -->
  <g filter="url(#soft)" opacity="0.5">
    <circle cx="212" cy="196" r="62" fill="#8B90A8"/>
    <circle cx="300" cy="212" r="56" fill="#E8A34D"/>
  </g>

  <!-- silver silhouette (left) -->
  <g>
    <circle cx="212" cy="196" r="58" fill="url(#fig1)"/>
    <path d="M110 372c0-64 46-104 102-104s102 40 102 104z" fill="url(#fig1)"/>
    <path d="M164 162 a58 58 0 0 1 82 -8" fill="none" stroke="#F4F6FB" stroke-width="3" stroke-opacity="0.7" stroke-linecap="round"/>
  </g>

  <!-- amber silhouette (right), overlapping -->
  <g opacity="0.94">
    <circle cx="300" cy="212" r="52" fill="url(#fig2)"/>
    <path d="M208 380c0-58 42-94 92-94s92 36 92 94z" fill="url(#fig2)"/>
    <path d="M262 176 a52 52 0 0 1 74 -4" fill="none" stroke="#FFE9C4" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  </g>
  <!-- overlap seam light -->
  <path d="M256 168 Q276 250 244 372" fill="none" stroke="#F4E3C8" stroke-width="2" stroke-opacity="0.35" filter="url(#soft2)"/>

  <!-- dissolving edge: silhouettes breaking into neural web -->
  <g stroke="#C9CDD8" stroke-width="2.4" stroke-opacity="0.55" fill="none" stroke-linecap="round">
    <path d="M352 176 Q396 150 420 118"/>
    <path d="M340 236 Q402 232 438 202"/>
    <path d="M362 300 Q408 312 432 296"/>
    <path d="M160 152 Q120 128 96 132"/>
    <path d="M148 210 Q104 208 76 190"/>
  </g>
  <g filter="url(#soft2)" opacity="0.8">
    <circle cx="420" cy="118" r="10" fill="#E8A34D"/>
    <circle cx="438" cy="202" r="8" fill="#E8A34D"/>
  </g>
  <g fill="#E8A34D">
    <circle cx="420" cy="118" r="8"/>
    <circle cx="438" cy="202" r="6.5"/>
    <circle cx="432" cy="296" r="5.5"/>
  </g>
  <g fill="#F4E3C8">
    <circle cx="96" cy="132" r="6"/>
    <circle cx="76" cy="190" r="4.5"/>
    <circle cx="396" cy="150" r="3.4" opacity="0.8"/>
    <circle cx="402" cy="232" r="3.4" opacity="0.8"/>
    <circle cx="408" cy="312" r="3.4" opacity="0.8"/>
    <circle cx="356" cy="130" r="2.4" opacity="0.6"/>
    <circle cx="452" cy="256" r="2.4" opacity="0.6"/>
  </g>

  <rect width="512" height="512" rx="112" fill="url(#vign)"/>
  <!-- top rim light on the tile -->
  <path d="M112 6 H400" stroke="#F4E3C8" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
</svg>
