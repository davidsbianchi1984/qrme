<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="Helvetica, Arial, sans-serif">
  <title>Engagement-based adaptation loop — signals in, refined responses out</title>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#23255F"/>
    </linearGradient>
    <radialGradient id="core6" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#F4E3C8" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#E8A34D" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#E8A34D"/>
    </marker>
    <marker id="arrow6s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#C9CDD8"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg6)"/>

  <!-- signal sources (left) -->
  <g font-size="15" fill="#C9CDD8">
    <g transform="translate(90 150)">
      <rect width="230" height="72" rx="14" fill="#2E3070" stroke="#C9CDD8" stroke-opacity="0.3"/>
      <g stroke="#E8A34D" stroke-width="3" stroke-linecap="round">
        <line x1="26" y1="26" x2="96" y2="26"/><line x1="26" y1="38" x2="76" y2="38"/><line x1="26" y1="50" x2="106" y2="50"/>
      </g>
      <text x="126" y="43">Response length</text>
    </g>
    <g transform="translate(90 300)">
      <rect width="230" height="72" rx="14" fill="#2E3070" stroke="#C9CDD8" stroke-opacity="0.3"/>
      <circle cx="46" cy="36" r="18" fill="none" stroke="#E8A34D" stroke-width="3"/>
      <path d="M46 24 v12 l9 6" stroke="#E8A34D" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="82" y="43">Return visits</text>
    </g>
    <g transform="translate(90 450)">
      <rect width="230" height="72" rx="14" fill="#2E3070" stroke="#C9CDD8" stroke-opacity="0.3"/>
      <circle cx="46" cy="36" r="18" fill="none" stroke="#E8A34D" stroke-width="3"/>
      <path d="M38 40 q8 8 16 0" stroke="#E8A34D" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="40" cy="31" r="2.4" fill="#E8A34D"/><circle cx="52" cy="31" r="2.4" fill="#E8A34D"/>
      <text x="82" y="43">Sentiment</text>
    </g>
    <g transform="translate(90 600)">
      <rect width="230" height="72" rx="14" fill="#2E3070" stroke="#C9CDD8" stroke-opacity="0.3"/>
      <path d="M36 44 v-14 a8 8 0 0 1 16 0 v6 h14 a6 6 0 0 1 0 12 h-24 z" fill="#E8A34D"/>
      <text x="82" y="43">Explicit feedback</text>
    </g>
  </g>

  <!-- signals flow into refining layer -->
  <g stroke="#E8A34D" stroke-width="2.5" fill="none" stroke-opacity="0.8">
    <path d="M320 186 Q460 200 520 300" marker-end="url(#arrow6)"/>
    <path d="M320 336 Q440 340 512 360" marker-end="url(#arrow6)"/>
    <path d="M320 486 Q440 470 512 420" marker-end="url(#arrow6)"/>
    <path d="M320 636 Q460 610 520 470" marker-end="url(#arrow6)"/>
  </g>
  <g fill="#E8A34D" opacity="0.8">
    <circle cx="430" cy="215" r="3.5"/><circle cx="420" cy="340" r="3"/><circle cx="425" cy="470" r="3"/><circle cx="440" cy="600" r="3.5"/>
  </g>

  <!-- refining neural layer -->
  <g transform="translate(560 260)">
    <rect x="-30" y="0" width="200" height="260" rx="24" fill="#2E3070" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="2"/>
    <text x="70" y="-16" text-anchor="middle" fill="#C9CDD8" font-size="15">Refining layer</text>
    <g fill="#C9CDD8">
      <circle cx="20" cy="50" r="9"/><circle cx="20" cy="130" r="9"/><circle cx="20" cy="210" r="9"/>
      <circle cx="120" cy="90" r="9"/><circle cx="120" cy="170" r="9"/>
    </g>
    <g stroke="#C9CDD8" stroke-width="1.6" stroke-opacity="0.6">
      <line x1="29" y1="50" x2="111" y2="90"/><line x1="29" y1="130" x2="111" y2="90"/>
      <line x1="29" y1="130" x2="111" y2="170"/><line x1="29" y1="210" x2="111" y2="170"/>
      <line x1="29" y1="50" x2="111" y2="170" stroke-opacity="0.3"/>
      <line x1="29" y1="210" x2="111" y2="90" stroke-opacity="0.3"/>
    </g>
    <circle cx="120" cy="90" r="9" fill="#E8A34D"/>
  </g>

  <!-- profile core (right) -->
  <g transform="translate(950 320)">
    <circle cx="0" cy="70" r="120" fill="url(#core6)"/>
    <circle cx="0" cy="52" r="40" fill="#E8A34D"/>
    <path d="M-60 164 C-60 106 -34 80 0 80 C34 80 60 106 60 164 Z" fill="#E8A34D" opacity="0.9"/>
    <text x="0" y="230" text-anchor="middle" fill="#C9CDD8" font-size="15">Synthetic profile</text>
  </g>

  <!-- refined layer feeds the profile; profile loops back as better replies -->
  <path d="M730 390 Q790 390 830 390" stroke="#E8A34D" stroke-width="3" fill="none" marker-end="url(#arrow6)"/>
  <path d="M950 560 Q620 700 330 690 Q210 684 205 672" stroke="#C9CDD8" stroke-width="2.5" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow6s)" opacity="0.8"/>
  <text x="600" y="726" text-anchor="middle" fill="#C9CDD8" font-size="15" opacity="0.9">more personalized responses → richer signals</text>

  <!-- guardrail note -->
  <g transform="translate(880 120)">
    <rect width="250" height="58" rx="12" fill="none" stroke="#C9CDD8" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="125" y="25" text-anchor="middle" fill="#C9CDD8" font-size="13">Adapts style and depth only —</text>
    <text x="125" y="44" text-anchor="middle" fill="#E8A34D" font-size="13">identity and boundaries fixed</text>
  </g>
</svg>
