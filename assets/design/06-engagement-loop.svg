<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="Helvetica, Arial, sans-serif">
  <title>Engagement-based adaptation loop — signals in, refined responses out</title>
  <defs>
    <linearGradient id="ebg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#0F1136"/>
    </linearGradient>
    <radialGradient id="evign" cx="0.5" cy="0.5" r="0.78">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="ecore" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#FFF6E6" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#F0C482" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="earc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8A34D"/>
      <stop offset="1" stop-color="#F4E3C8"/>
    </linearGradient>
    <linearGradient id="earc2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9CDD8"/>
      <stop offset="1" stop-color="#8B90A8"/>
    </linearGradient>
    <filter id="eshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="esoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
    <marker id="earrow" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto">
      <path d="M1 1 L7.5 4.5 L1 8 Z" fill="#E8A34D"/>
    </marker>
    <marker id="earrow2" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto">
      <path d="M1 1 L7.5 4.5 L1 8 Z" fill="#C9CDD8"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#ebg)"/>

  <text x="600" y="64" text-anchor="middle" font-size="30" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">The engagement loop</text>
  <text x="600" y="92" text-anchor="middle" font-size="16" fill="#8B90A8">Every interaction tunes the next one</text>

  <!-- center dial -->
  <g transform="translate(600 420)">
    <g filter="url(#esoft)"><circle r="120" fill="#E8A34D" opacity="0.35"/></g>
    <circle r="150" fill="url(#ecore)"/>
    <circle r="104" fill="#1E2050"/>
    <circle r="104" fill="none" stroke="#F4E3C8" stroke-opacity="0.4" stroke-width="1.6"/>
    <!-- EMA gauge -->
    <path d="M-70 34 A78 78 0 1 1 70 34" fill="none" stroke="#2E3170" stroke-width="12" stroke-linecap="round"/>
    <path d="M-70 34 A78 78 0 0 1 -22 -75" fill="none" stroke="#C9CDD8" stroke-width="12" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M-22 -75 A78 78 0 0 1 58 -20" fill="none" stroke="url(#earc1)" stroke-width="12" stroke-linecap="round"/>
    <circle cx="58" cy="-20" r="9" fill="#FFF6E6"/>
    <text y="0" text-anchor="middle" font-size="34" font-weight="bold" fill="#F4E3C8">0.78</text>
    <text y="26" text-anchor="middle" font-size="12" fill="#8B90A8" letter-spacing="2">ENGAGEMENT EMA</text>
    <text y="62" text-anchor="middle" font-size="11" fill="#8B90A8">α = 0.3 · per relationship</text>
  </g>

  <!-- loop arcs -->
  <g fill="none" stroke-linecap="round">
    <path d="M415 300 A230 230 0 0 1 785 300" stroke="url(#earc1)" stroke-width="5" marker-end="url(#earrow)"/>
    <path d="M810 530 A230 230 0 0 1 390 530" stroke="url(#earc2)" stroke-width="3.4" marker-end="url(#earrow2)" stroke-opacity="0.8"/>
  </g>

  <!-- ==== stations ==== -->
  <!-- signals in (left) -->
  <g transform="translate(120 250)" filter="url(#eshadow)">
    <rect width="240" height="180" rx="18" fill="#252761"/>
    <rect width="240" height="180" rx="18" fill="none" stroke="#C9CDD8" stroke-opacity="0.3" stroke-width="1.2"/>
    <text x="20" y="34" font-size="15" font-weight="bold" fill="#F4E3C8">Signals in</text>
    <g font-size="12.5" fill="#C9CDD8">
      <circle cx="26" cy="60" r="3.4" fill="#E8A34D"/><text x="40" y="64">session length &amp; gaps</text>
      <circle cx="26" cy="88" r="3.4" fill="#E8A34D"/><text x="40" y="92">reply depth</text>
      <circle cx="26" cy="116" r="3.4" fill="#E8A34D"/><text x="40" y="120">sentiment</text>
      <circle cx="26" cy="144" r="3.4" fill="#E8A34D"/><text x="40" y="148">return frequency</text>
    </g>
  </g>

  <!-- adaptation (top) -->
  <g transform="translate(480 130)" filter="url(#eshadow)">
    <rect width="240" height="110" rx="18" fill="#2E3170"/>
    <rect width="240" height="110" rx="18" fill="none" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="20" y="34" font-size="15" font-weight="bold" fill="#F4E3C8">Adapt</text>
    <text x="20" y="60" font-size="12.5" fill="#C9CDD8">tone · pacing · topic choice</text>
    <text x="20" y="82" font-size="12.5" fill="#C9CDD8">depth of shared memory</text>
  </g>

  <!-- refined responses out (right) -->
  <g transform="translate(840 250)" filter="url(#eshadow)">
    <rect width="240" height="180" rx="18" fill="#252761"/>
    <rect width="240" height="180" rx="18" fill="none" stroke="#C9CDD8" stroke-opacity="0.3" stroke-width="1.2"/>
    <text x="20" y="34" font-size="15" font-weight="bold" fill="#F4E3C8">Responses out</text>
    <g transform="translate(20 54)">
      <rect width="200" height="30" rx="10" fill="#3A3D7E"/>
      <text x="12" y="20" font-size="12" fill="#F4E3C8">richer callbacks ✓</text>
      <rect y="40" width="200" height="30" rx="10" fill="#3A3D7E" opacity="0.8"/>
      <text x="12" y="60" font-size="12" fill="#C9CDD8">better-matched tone ✓</text>
      <rect y="80" width="200" height="30" rx="10" fill="#3A3D7E" opacity="0.6"/>
      <text x="12" y="100" font-size="12" fill="#C9CDD8">timely check-ins ✓</text>
    </g>
  </g>

  <!-- observe (bottom) -->
  <g transform="translate(480 600)" filter="url(#eshadow)">
    <rect width="240" height="100" rx="18" fill="#20224F"/>
    <rect width="240" height="100" rx="18" fill="none" stroke="#8B90A8" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="20" y="34" font-size="15" font-weight="bold" fill="#C9CDD8">Observe</text>
    <text x="20" y="60" font-size="12.5" fill="#8B90A8">next session's signals feed the</text>
    <text x="20" y="80" font-size="12.5" fill="#8B90A8">same score — the loop closes</text>
  </g>

  <!-- connecting ticks -->
  <g stroke="#8B90A8" stroke-opacity="0.5" stroke-width="1.4" stroke-dasharray="2 6">
    <path d="M360 340 L448 360" fill="none"/>
    <path d="M840 360 L752 340" fill="none"/>
    <path d="M600 240 L600 268" fill="none"/>
    <path d="M600 572 L600 600" fill="none"/>
  </g>

  <rect width="1200" height="760" fill="url(#evign)"/>
</svg>
