<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 620" width="1300" height="620" font-family="Helvetica, Arial, sans-serif">
  <title>Content moderation pipeline — profile output passes through safety filters before visibility</title>
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#12143B"/>
      <stop offset="0.5" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#12143B"/>
    </linearGradient>
    <radialGradient id="pvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="pgate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E4187"/>
      <stop offset="1" stop-color="#23255C"/>
    </linearGradient>
    <filter id="pshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="psoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8"/></filter>
    <marker id="parrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M1 1 L8.5 5 L1 9 Z" fill="#8B90A8"/>
    </marker>
  </defs>

  <rect width="1300" height="620" fill="url(#pbg)"/>

  <text x="650" y="62" text-anchor="middle" font-size="28" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">Every reply passes the gates</text>
  <text x="650" y="90" text-anchor="middle" font-size="15" fill="#8B90A8">Profile output → safety filters → approved, held for review, or rejected</text>

  <!-- conveyor line -->
  <line x1="100" y1="330" x2="1200" y2="330" stroke="#3A3D7E" stroke-width="2" stroke-dasharray="8 10" marker-end="url(#parrow)"/>

  <!-- source: profile -->
  <g transform="translate(150 330)">
    <g filter="url(#psoft)"><circle r="58" fill="#E8A34D" opacity="0.4"/></g>
    <circle r="50" fill="#F0C482"/>
    <circle cy="-14" r="18" fill="#1B1D4E"/>
    <path d="M-30 34 C-30 6 -16 -2 0 -2 C16 -2 30 6 30 34 Z" fill="#1B1D4E"/>
    <circle r="50" fill="none" stroke="#FFF6E6" stroke-opacity="0.5" stroke-width="1.4"/>
    <text y="82" text-anchor="middle" font-size="13" fill="#C9CDD8">profile reply</text>
  </g>

  <!-- message chip approaching -->
  <g transform="translate(238 296)" filter="url(#pshadow)">
    <rect width="120" height="40" rx="12" fill="#2E3170"/>
    <rect width="120" height="40" rx="12" fill="none" stroke="#C9CDD8" stroke-opacity="0.3"/>
    <g fill="#8B90A8"><rect x="14" y="12" width="70" height="5" rx="2.5"/><rect x="14" y="23" width="92" height="5" rx="2.5"/></g>
  </g>

  <!-- ===== three filter gates ===== -->
  <g filter="url(#pshadow)">
    <g transform="translate(420 190)">
      <rect width="130" height="280" rx="16" fill="url(#pgate)"/>
      <rect width="130" height="280" rx="16" fill="none" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.4"/>
      <rect x="24" y="120" width="82" height="46" rx="10" fill="#12143B"/>
      <rect x="30" y="126" width="70" height="34" rx="7" fill="none" stroke="#E8A34D" stroke-opacity="0.6" stroke-width="1.4"/>
      <text x="65" y="40" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#F4E3C8">Policy</text>
      <text x="65" y="58" text-anchor="middle" font-size="11" fill="#8B90A8">platform rules</text>
      <circle cx="65" cy="240" r="7" fill="#7BC47F"/>
    </g>
    <g transform="translate(600 190)">
      <rect width="130" height="280" rx="16" fill="url(#pgate)"/>
      <rect width="130" height="280" rx="16" fill="none" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.4"/>
      <rect x="24" y="120" width="82" height="46" rx="10" fill="#12143B"/>
      <rect x="30" y="126" width="70" height="34" rx="7" fill="none" stroke="#E8A34D" stroke-opacity="0.6" stroke-width="1.4"/>
      <text x="65" y="40" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#F4E3C8">Safety</text>
      <text x="65" y="58" text-anchor="middle" font-size="11" fill="#8B90A8">harm &amp; crisis cues</text>
      <circle cx="65" cy="240" r="7" fill="#7BC47F"/>
    </g>
    <g transform="translate(780 190)">
      <rect width="130" height="280" rx="16" fill="url(#pgate)"/>
      <rect width="130" height="280" rx="16" fill="none" stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.4"/>
      <rect x="24" y="120" width="82" height="46" rx="10" fill="#12143B"/>
      <rect x="30" y="126" width="70" height="34" rx="7" fill="none" stroke="#E8A34D" stroke-opacity="0.6" stroke-width="1.4"/>
      <text x="65" y="40" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#F4E3C8">Owner rules</text>
      <text x="65" y="58" text-anchor="middle" font-size="11" fill="#8B90A8">per-profile bounds</text>
      <circle cx="65" cy="240" r="7" fill="#E8C34D"/>
    </g>
  </g>

  <!-- beams between gates -->
  <g stroke="#E8A34D" stroke-opacity="0.35" stroke-width="2">
    <line x1="550" y1="330" x2="600" y2="330"/>
    <line x1="730" y1="330" x2="780" y2="330"/>
  </g>

  <!-- ===== outcomes ===== -->
  <g>
    <path d="M910 300 C980 260 1020 240 1060 226" fill="none" stroke="#7BC47F" stroke-width="2.6" stroke-opacity="0.8" marker-end="url(#parrow)"/>
    <path d="M910 330 C980 330 1020 330 1058 330" fill="none" stroke="#E8C34D" stroke-width="2.2" stroke-opacity="0.8" marker-end="url(#parrow)"/>
    <path d="M910 360 C980 400 1020 420 1060 434" fill="none" stroke="#D96A6A" stroke-width="2" stroke-opacity="0.7" marker-end="url(#parrow)"/>
  </g>
  <g filter="url(#pshadow)" text-anchor="middle" font-size="13.5">
    <g transform="translate(1080 196)">
      <rect width="150" height="58" rx="14" fill="#1E3324"/>
      <rect width="150" height="58" rx="14" fill="none" stroke="#7BC47F" stroke-opacity="0.6" stroke-width="1.4"/>
      <text x="75" y="26" fill="#7BC47F" font-weight="bold">✓ Approved</text>
      <text x="75" y="45" fill="#8FAF93" font-size="11">delivered now</text>
    </g>
    <g transform="translate(1080 300)">
      <rect width="150" height="58" rx="14" fill="#33301C"/>
      <rect width="150" height="58" rx="14" fill="none" stroke="#E8C34D" stroke-opacity="0.6" stroke-width="1.4"/>
      <text x="75" y="26" fill="#E8C34D" font-weight="bold">⏸ Held</text>
      <text x="75" y="45" fill="#B0A878" font-size="11">owner review queue</text>
    </g>
    <g transform="translate(1080 404)">
      <rect width="150" height="58" rx="14" fill="#33201F"/>
      <rect width="150" height="58" rx="14" fill="none" stroke="#D96A6A" stroke-opacity="0.6" stroke-width="1.4"/>
      <text x="75" y="26" fill="#D96A6A" font-weight="bold">✕ Rejected</text>
      <text x="75" y="45" fill="#AF8383" font-size="11">never shown</text>
    </g>
  </g>

  <text x="650" y="560" text-anchor="middle" font-size="14" fill="#8B90A8">Flag reasons are logged with every decision — the queue shows who held what, and why.</text>

  <rect width="1300" height="620" fill="url(#pvign)"/>
</svg>
