<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 620" width="1300" height="620" font-family="Helvetica, Arial, sans-serif">
  <title>Content moderation pipeline — profile output passes through safety filters before visibility</title>
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#23255F"/>
    </linearGradient>
    <radialGradient id="core8" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#F4E3C8" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#E8A34D" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="filter8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9CDD8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#C9CDD8" stop-opacity="0.1"/>
    </linearGradient>
    <marker id="arrow8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#E8A34D"/>
    </marker>
  </defs>

  <rect width="1300" height="620" fill="url(#bg8)"/>

  <!-- profile generating a reply -->
  <g transform="translate(140 230)">
    <circle cx="0" cy="60" r="105" fill="url(#core8)"/>
    <circle cx="0" cy="44" r="34" fill="#E8A34D"/>
    <path d="M-52 140 C-52 90 -30 68 0 68 C30 68 52 90 52 140 Z" fill="#E8A34D" opacity="0.9"/>
    <text x="0" y="200" text-anchor="middle" fill="#C9CDD8" font-size="14">Synthetic profile</text>
  </g>

  <!-- draft message card -->
  <g transform="translate(255 160)">
    <rect width="150" height="76" rx="14" fill="#FFF7EA"/>
    <g stroke="#8B90A8" stroke-width="3" stroke-linecap="round">
      <line x1="20" y1="24" x2="130" y2="24"/><line x1="20" y1="40" x2="110" y2="40"/><line x1="20" y1="56" x2="120" y2="56"/>
    </g>
  </g>

  <!-- flow line -->
  <g stroke="#E8A34D" stroke-width="3" fill="none">
    <line x1="405" y1="300" x2="480" y2="300" marker-end="url(#arrow8)"/>
    <line x1="600" y1="300" x2="660" y2="300" marker-end="url(#arrow8)"/>
    <line x1="780" y1="300" x2="840" y2="300" marker-end="url(#arrow8)"/>
    <line x1="960" y1="300" x2="1030" y2="300" marker-end="url(#arrow8)"/>
  </g>

  <!-- three translucent filter layers -->
  <g text-anchor="middle" font-size="14">
    <g transform="translate(490 130)">
      <rect width="110" height="340" rx="18" fill="url(#filter8)" stroke="#C9CDD8" stroke-opacity="0.55" stroke-width="2"/>
      <path d="M55 40 l26 12 v22 c0 22 -12 34 -26 40 c-14 -6 -26 -18 -26 -40 v-22 z" fill="none" stroke="#C9CDD8" stroke-width="2.5"/>
      <text x="55" y="220" fill="#C9CDD8">Community</text>
      <text x="55" y="240" fill="#C9CDD8">standards</text>
    </g>
    <g transform="translate(670 130)">
      <rect width="110" height="340" rx="18" fill="url(#filter8)" stroke="#C9CDD8" stroke-opacity="0.55" stroke-width="2"/>
      <path d="M55 40 l26 12 v22 c0 22 -12 34 -26 40 c-14 -6 -26 -18 -26 -40 v-22 z" fill="none" stroke="#C9CDD8" stroke-width="2.5"/>
      <text x="55" y="86" fill="#E8A34D" font-weight="bold">18</text>
      <text x="55" y="220" fill="#C9CDD8">Age</text>
      <text x="55" y="240" fill="#C9CDD8">appropriateness</text>
    </g>
    <g transform="translate(850 130)">
      <rect width="110" height="340" rx="18" fill="url(#filter8)" stroke="#E8A34D" stroke-opacity="0.7" stroke-width="2"/>
      <path d="M55 40 l26 12 v22 c0 22 -12 34 -26 40 c-14 -6 -26 -18 -26 -40 v-22 z" fill="none" stroke="#E8A34D" stroke-width="2.5"/>
      <path d="M46 82 l7 7 l14 -16" stroke="#E8A34D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="55" y="220" fill="#E8A34D">Owner</text>
      <text x="55" y="240" fill="#E8A34D">approval</text>
    </g>
  </g>

  <!-- held-for-review side path -->
  <g opacity="0.75">
    <path d="M905 470 Q905 540 990 540" stroke="#C9CDD8" stroke-width="2" fill="none" stroke-dasharray="6 6"/>
    <rect x="994" y="516" width="180" height="48" rx="12" fill="none" stroke="#C9CDD8" stroke-opacity="0.6"/>
    <text x="1084" y="545" text-anchor="middle" fill="#C9CDD8" font-size="13">held: pending queue</text>
  </g>

  <!-- public visibility -->
  <g transform="translate(1040 210)">
    <rect width="190" height="180" rx="20" fill="#2E3070" stroke="#E8A34D" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="95" cy="66" r="30" fill="none" stroke="#E8A34D" stroke-width="3"/>
    <circle cx="95" cy="66" r="12" fill="#E8A34D"/>
    <path d="M35 66 a60 60 0 0 1 120 0" fill="none" stroke="#C9CDD8" stroke-opacity="0.5" stroke-width="2"/>
    <text x="95" y="130" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">Visible</text>
    <text x="95" y="152" text-anchor="middle" fill="#C9CDD8" font-size="13">feeds · chat · replies</text>
  </g>
</svg>
