<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Helvetica, Arial, sans-serif">
  <title>Relationship-aware interaction — one profile, different voices per relationship</title>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3D2E4F"/>
      <stop offset="0.5" stop-color="#23255F"/>
      <stop offset="1" stop-color="#14204A"/>
    </linearGradient>
    <radialGradient id="core4" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#F4E3C8" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#E8A34D" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg4)"/>

  <!-- radiating threads -->
  <g stroke-linecap="round" fill="none">
    <path d="M600 400 Q420 250 250 190" stroke="#E8A34D" stroke-width="4" stroke-opacity="0.8"/>
    <path d="M600 400 Q800 240 950 180" stroke="#C9CDD8" stroke-width="3" stroke-opacity="0.6"/>
    <path d="M600 400 Q420 560 250 620" stroke="#E8A34D" stroke-width="3" stroke-opacity="0.6"/>
    <path d="M600 400 Q800 560 950 620" stroke="#C9CDD8" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="2 8"/>
  </g>

  <!-- central synthetic avatar -->
  <circle cx="600" cy="400" r="130" fill="url(#core4)"/>
  <circle cx="600" cy="382" r="44" fill="#E8A34D"/>
  <path d="M534 500 C534 440 562 412 600 412 C638 412 666 440 666 500 Z" fill="#E8A34D" opacity="0.9"/>
  <circle cx="600" cy="400" r="130" fill="none" stroke="#F4E3C8" stroke-opacity="0.35" stroke-width="2"/>

  <!-- grandchild: warm family bubble -->
  <g transform="translate(120 110)">
    <rect width="270" height="130" rx="26" fill="#E8A34D"/>
    <path d="M240 130 l26 26 v-26 z" fill="#E8A34D"/>
    <circle cx="42" cy="46" r="14" fill="#161840" opacity="0.25"/>
    <path d="M36 44 c0-6 12-6 12 0 c0 5-6 9-6 9 s-6-4-6-9z" fill="#FFF7EA"/>
    <text x="70" y="52" fill="#161840" font-size="16" font-weight="bold">Grandchild</text>
    <text x="42" y="88" fill="#161840" font-size="14" opacity="0.85">"Sammy! Come sit, let me tell</text>
    <text x="42" y="108" fill="#161840" font-size="14" opacity="0.85">you about the summer of '62…"</text>
  </g>

  <!-- professional contact: formal corporate bubble -->
  <g transform="translate(830 100)">
    <rect width="270" height="130" rx="8" fill="#C9CDD8"/>
    <path d="M30 130 l-26 26 v-26 z" fill="#C9CDD8"/>
    <rect x="30" y="32" width="24" height="20" rx="3" fill="#23255F"/>
    <rect x="36" y="26" width="12" height="8" rx="2" fill="#23255F"/>
    <text x="66" y="49" fill="#161840" font-size="16" font-weight="bold">Professional</text>
    <text x="30" y="86" fill="#23255F" font-size="14">"Thank you for the update —</text>
    <text x="30" y="106" fill="#23255F" font-size="14">I'll review the proposal today."</text>
  </g>

  <!-- close friend: relaxed warm bubble -->
  <g transform="translate(110 560)">
    <rect width="270" height="130" rx="34" fill="#D98F63"/>
    <path d="M240 12 l26 -26 v26 z" fill="#D98F63"/>
    <circle cx="44" cy="44" r="12" fill="#FFF7EA" opacity="0.9"/>
    <circle cx="60" cy="44" r="12" fill="#FFF7EA" opacity="0.6"/>
    <text x="86" y="50" fill="#161840" font-size="16" font-weight="bold">Close friend</text>
    <text x="40" y="88" fill="#161840" font-size="14" opacity="0.85">"You will NOT believe what</text>
    <text x="40" y="108" fill="#161840" font-size="14" opacity="0.85">happened at the garden club…"</text>
  </g>

  <!-- stranger: neutral reserved bubble -->
  <g transform="translate(830 570)">
    <rect width="270" height="120" rx="14" fill="none" stroke="#C9CDD8" stroke-width="2.5"/>
    <path d="M30 0 l-24 -24 v24 z" fill="#14204A" stroke="#C9CDD8" stroke-width="2.5"/>
    <circle cx="44" cy="40" r="13" fill="none" stroke="#C9CDD8" stroke-width="2.5"/>
    <text x="44" y="46" text-anchor="middle" fill="#C9CDD8" font-size="15">?</text>
    <text x="70" y="46" fill="#C9CDD8" font-size="16" font-weight="bold">Stranger</text>
    <text x="30" y="82" fill="#C9CDD8" font-size="14" opacity="0.85">"Hello — nice to meet you.</text>
    <text x="30" y="102" fill="#C9CDD8" font-size="14" opacity="0.85">How can I help?"</text>
  </g>
</svg>
