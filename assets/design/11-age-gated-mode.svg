<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 640" width="1300" height="640" font-family="Helvetica, Arial, sans-serif">
  <title>Age-gated adult mode — a verification gate separates a distinct, refined space</title>
  <defs>
    <linearGradient id="gbgL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#191B47"/>
    </linearGradient>
    <linearGradient id="gbgR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#241A3F"/>
      <stop offset="1" stop-color="#31204F"/>
    </linearGradient>
    <radialGradient id="gvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.64" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="ggate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A4E96"/>
      <stop offset="1" stop-color="#23255C"/>
    </linearGradient>
    <radialGradient id="gwarm" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#E8A34D" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
    <filter id="gshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="gsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- two-tone space -->
  <rect width="650" height="640" fill="url(#gbgL)"/>
  <rect x="650" width="650" height="640" fill="url(#gbgR)"/>

  <text x="650" y="62" text-anchor="middle" font-size="28" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">A separate, verified space</text>
  <text x="650" y="90" text-anchor="middle" font-size="15" fill="#8B90A8">Adult mode is opt-in, age-verified, and clearly distinct — never the default</text>

  <!-- ===== standard space (left) ===== -->
  <g transform="translate(240 350)">
    <g filter="url(#gsoft)"><circle r="70" fill="#C9CDD8" opacity="0.25"/></g>
    <circle cy="-24" r="30" fill="#AEB3C6"/>
    <path d="M-48 70 C-48 16 -26 -4 0 -4 C26 -4 48 16 48 70 Z" fill="#AEB3C6"/>
    <text y="106" text-anchor="middle" font-size="14.5" fill="#C9CDD8" font-weight="bold">Standard mode</text>
    <text y="128" text-anchor="middle" font-size="12" fill="#8B90A8">the everyday experience</text>
  </g>
  <g transform="translate(120 180)" opacity="0.85" filter="url(#gshadow)">
    <rect width="240" height="66" rx="14" fill="#2E3170"/>
    <g fill="#8B90A8"><rect x="18" y="18" width="150" height="6" rx="3"/><rect x="18" y="34" width="190" height="6" rx="3"/></g>
    <circle cx="214" cy="48" r="4" fill="#C9CDD8"/>
  </g>

  <!-- ===== the gate ===== -->
  <g transform="translate(650 330)" filter="url(#gshadow)">
    <!-- posts -->
    <rect x="-96" y="-190" width="26" height="400" rx="10" fill="url(#ggate)"/>
    <rect x="70" y="-190" width="26" height="400" rx="10" fill="url(#ggate)"/>
    <rect x="-104" y="-206" width="208" height="30" rx="12" fill="url(#ggate)"/>
    <!-- shield -->
    <g>
      <g filter="url(#gsoft)"><path d="M0 -110 L62 -84 V-16 C62 34 34 66 0 82 C-34 66 -62 34 -62 -16 V-84 Z" fill="#E8A34D" opacity="0.5"/></g>
      <path d="M0 -104 L56 -80 V-18 C56 28 30 58 0 73 C-30 58 -56 28 -56 -18 V-80 Z" fill="#23255C" stroke="#E8A34D" stroke-width="2.4"/>
      <!-- check + 18+ -->
      <text y="-18" text-anchor="middle" font-size="26" font-weight="bold" fill="#E8A34D">18+</text>
      <path d="M-18 16 L-5 30 L22 0" fill="none" stroke="#7BC47F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text y="136" text-anchor="middle" font-size="13.5" fill="#F4E3C8" font-weight="bold">Verification gate</text>
    <g text-anchor="middle" font-size="11.5" fill="#8B90A8">
      <text y="158">age check · explicit opt-in</text>
      <text y="176">both parties verified</text>
    </g>
  </g>

  <!-- ===== refined space (right) ===== -->
  <ellipse cx="1000" cy="360" rx="260" ry="220" fill="url(#gwarm)"/>
  <g transform="translate(1030 350)">
    <g filter="url(#gsoft)"><circle r="70" fill="#E8A34D" opacity="0.35"/></g>
    <circle cy="-24" r="30" fill="#F0C482"/>
    <path d="M-48 70 C-48 16 -26 -4 0 -4 C26 -4 48 16 48 70 Z" fill="#F0C482"/>
    <circle cy="-24" r="38" fill="none" stroke="#E8A34D" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="2 8"/>
    <text y="106" text-anchor="middle" font-size="14.5" fill="#F0C482" font-weight="bold">Adult mode</text>
    <text y="128" text-anchor="middle" font-size="12" fill="#8B90A8">distinct look · separate memory scope</text>
  </g>
  <g transform="translate(940 180)" filter="url(#gshadow)">
    <rect width="240" height="66" rx="14" fill="#3A2A55"/>
    <rect width="240" height="66" rx="14" fill="none" stroke="#E8A34D" stroke-opacity="0.4" stroke-width="1.2"/>
    <g fill="#B99AC9"><rect x="18" y="18" width="160" height="6" rx="3"/><rect x="18" y="34" width="180" height="6" rx="3"/></g>
    <circle cx="214" cy="48" r="4" fill="#E8A34D"/>
  </g>

  <!-- baseline safeguards strip -->
  <g transform="translate(650 576)" text-anchor="middle" filter="url(#gshadow)">
    <rect x="-330" y="-26" width="660" height="46" rx="23" fill="#12143B"/>
    <rect x="-330" y="-26" width="660" height="46" rx="23" fill="none" stroke="#3A3D7E" stroke-width="1.4"/>
    <text y="3" font-size="13" fill="#C9CDD8">moderation still applies · revocable anytime · minors never eligible · activity kept out of shared memory</text>
  </g>

  <rect width="1300" height="640" fill="url(#gvign)"/>
</svg>
