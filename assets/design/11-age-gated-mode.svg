<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 640" width="1300" height="640" font-family="Helvetica, Arial, sans-serif">
  <title>Age-gated adult mode — a verification gate separates a distinct, refined space</title>
  <defs>
    <linearGradient id="left11" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F2F3F7"/>
      <stop offset="1" stop-color="#E1E3ED"/>
    </linearGradient>
    <linearGradient id="right11" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14122E"/>
      <stop offset="1" stop-color="#241B3A"/>
    </linearGradient>
    <radialGradient id="lamp11" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#E8A34D" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E8A34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- default experience: light, open -->
  <rect width="700" height="640" fill="url(#left11)"/>
  <g opacity="0.7">
    <rect x="90" y="150" width="220" height="60" rx="18" fill="#FFFFFF" stroke="#C9CDD8"/>
    <rect x="140" y="240" width="220" height="60" rx="18" fill="#FFFFFF" stroke="#C9CDD8"/>
    <rect x="90" y="330" width="180" height="60" rx="18" fill="#FFFFFF" stroke="#C9CDD8"/>
    <circle cx="120" cy="180" r="14" fill="#E8A34D"/>
    <circle cx="170" cy="270" r="14" fill="#C9CDD8"/>
    <circle cx="120" cy="360" r="14" fill="#E8A34D"/>
  </g>
  <text x="240" y="560" text-anchor="middle" fill="#8B90A8" font-size="16">Default experience</text>

  <!-- verification gate -->
  <g transform="translate(560 90)">
    <rect width="180" height="460" rx="16" fill="#23255F"/>
    <rect x="12" y="12" width="156" height="436" rx="10" fill="#2E3070"/>
    <!-- lock -->
    <g transform="translate(64 96)">
      <rect y="22" width="52" height="42" rx="8" fill="#E8A34D"/>
      <path d="M9 22 v-6 a17 17 0 0 1 34 0 v6" fill="none" stroke="#E8A34D" stroke-width="6"/>
      <circle cx="26" cy="42" r="6" fill="#161840"/>
    </g>
    <rect x="46" y="210" width="88" height="88" rx="16" fill="none" stroke="#E8A34D" stroke-width="3.5"/>
    <text x="90" y="264" text-anchor="middle" fill="#E8A34D" font-size="28" font-weight="bold">18+</text>
    <text x="90" y="340" text-anchor="middle" fill="#C9CDD8" font-size="13">Verified age</text>
    <text x="90" y="362" text-anchor="middle" fill="#C9CDD8" font-size="13">+ explicit consent</text>
    <rect x="36" y="392" width="108" height="34" rx="17" fill="#E8A34D"/>
    <text x="90" y="414" text-anchor="middle" fill="#161840" font-size="13" font-weight="bold">Enter</text>
  </g>

  <!-- adult mode: darker, refined, restrained -->
  <rect x="700" width="600" height="640" fill="url(#right11)"/>
  <rect x="700" width="600" height="640" fill="url(#lamp11)"/>
  <g opacity="0.9">
    <!-- refined lounge lighting: pendant lamp + warm glow -->
    <line x1="1000" y1="0" x2="1000" y2="120" stroke="#C9CDD8" stroke-opacity="0.4" stroke-width="2"/>
    <path d="M970 120 h60 l-14 34 h-32 z" fill="#E8A34D" opacity="0.85"/>
    <ellipse cx="1000" cy="380" rx="200" ry="16" fill="#E8A34D" opacity="0.12"/>
    <!-- two adult silhouettes in conversation, non-explicit -->
    <g fill="#3A2F52">
      <circle cx="900" cy="300" r="34"/>
      <path d="M840 470 C840 372 868 340 900 340 C932 340 960 372 960 470 Z"/>
      <circle cx="1105" cy="306" r="32"/>
      <path d="M1049 470 C1049 378 1075 348 1105 348 C1135 348 1161 378 1161 470 Z"/>
    </g>
    <g stroke="#E8A34D" stroke-opacity="0.5" stroke-width="1.5" fill="none">
      <circle cx="900" cy="300" r="44"/>
      <circle cx="1105" cy="306" r="42"/>
    </g>
  </g>
  <text x="1000" y="560" text-anchor="middle" fill="#C9CDD8" font-size="16" opacity="0.9">Adult mode — separate, consent-gated space</text>
</svg>
