<svg role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 560" width="1500" height="560" font-family="Helvetica, Arial, sans-serif">
  <title id="t">QRME user persona set — five consistent character illustrations</title>
  <desc id="d">QRME user persona set — five consistent character illustrations. Hand-built vector illustration from the QRME product family design system.</desc>
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1D4E"/>
      <stop offset="1" stop-color="#101235"/>
    </linearGradient>
    <radialGradient id="cvign" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.66" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#090A26" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="ccard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2C63"/>
      <stop offset="1" stop-color="#20224F"/>
    </linearGradient>
    <filter id="cshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#05061C" flood-opacity="0.55"/>
    </filter>
    <filter id="csoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8"/></filter>
    <linearGradient id="cf1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F5C57F"/><stop offset="1" stop-color="#D98F3B"/></linearGradient>
    <linearGradient id="cf2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#DDE1EC"/><stop offset="1" stop-color="#9BA1BC"/></linearGradient>
    <linearGradient id="cf3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#A9C4E8"/><stop offset="1" stop-color="#6E8BB8"/></linearGradient>
    <linearGradient id="cf4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#DCB8D4"/><stop offset="1" stop-color="#A87BA0"/></linearGradient>
    <linearGradient id="cf5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#B8D8C8"/><stop offset="1" stop-color="#7FA893"/></linearGradient>
  </defs>

  <rect width="1500" height="560" fill="url(#cbg)"/>

  <text x="750" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#F4E3C8" letter-spacing="1.5">Who QRME is for</text>

  <!-- ===== card 1: legacy keeper ===== -->
  <g transform="translate(60 110)" filter="url(#cshadow)">
    <rect width="252" height="380" rx="20" fill="url(#ccard)"/>
    <rect width="252" height="380" rx="20" fill="none" stroke="#E8A34D" stroke-opacity="0.45" stroke-width="1.4"/>
    <g transform="translate(126 130)">
      <g filter="url(#csoft)"><circle r="56" fill="#E8A34D" opacity="0.35"/></g>
      <circle cy="-14" r="34" fill="url(#cf1)"/>
      <path d="M-52 84 C-52 20 -27 -2 0 -2 C27 -2 52 20 52 84 Z" fill="url(#cf1)"/>
      <path d="M-24 -34 a34 34 0 0 1 50 -4" fill="none" stroke="#FFF6E6" stroke-width="2.2" stroke-opacity="0.7" stroke-linecap="round"/>
    </g>
    <text x="126" y="252" text-anchor="middle" font-size="17" font-weight="bold" fill="#F4E3C8">Rosa, 71</text>
    <text x="126" y="274" text-anchor="middle" font-size="12.5" fill="#E8A34D">The legacy keeper</text>
    <g text-anchor="middle" font-size="11.5" fill="#8B90A8">
      <text x="126" y="304">Builds a profile of her late husband</text>
      <text x="126" y="322">from letters and voice notes, so the</text>
      <text x="126" y="340">grandkids can hear his stories.</text>
    </g>
  </g>

  <!-- ===== card 2: the connector ===== -->
  <g transform="translate(340 110)" filter="url(#cshadow)">
    <rect width="252" height="380" rx="20" fill="url(#ccard)"/>
    <rect width="252" height="380" rx="20" fill="none" stroke="#C9CDD8" stroke-opacity="0.3" stroke-width="1.2"/>
    <g transform="translate(126 130)">
      <g filter="url(#csoft)"><circle r="56" fill="#C9CDD8" opacity="0.3"/></g>
      <circle cy="-14" r="34" fill="url(#cf2)"/>
      <path d="M-52 84 C-52 20 -27 -2 0 -2 C27 -2 52 20 52 84 Z" fill="url(#cf2)"/>
    </g>
    <text x="126" y="252" text-anchor="middle" font-size="17" font-weight="bold" fill="#F4E3C8">Marcus, 38</text>
    <text x="126" y="274" text-anchor="middle" font-size="12.5" fill="#C9CDD8">The busy connector</text>
    <g text-anchor="middle" font-size="11.5" fill="#8B90A8">
      <text x="126" y="304">Keeps a warm presence for far-away</text>
      <text x="126" y="322">family; his profile knows who's kin</text>
      <text x="126" y="340">and who's a colleague.</text>
    </g>
  </g>

  <!-- ===== card 3: the creator ===== -->
  <g transform="translate(620 110)" filter="url(#cshadow)">
    <rect width="252" height="380" rx="20" fill="url(#ccard)"/>
    <rect width="252" height="380" rx="20" fill="none" stroke="#A9C4E8" stroke-opacity="0.35" stroke-width="1.2"/>
    <g transform="translate(126 130)">
      <g filter="url(#csoft)"><circle r="56" fill="#A9C4E8" opacity="0.3"/></g>
      <circle cy="-14" r="34" fill="url(#cf3)"/>
      <path d="M-52 84 C-52 20 -27 -2 0 -2 C27 -2 52 20 52 84 Z" fill="url(#cf3)"/>
    </g>
    <text x="126" y="252" text-anchor="middle" font-size="17" font-weight="bold" fill="#F4E3C8">Yuki, 26</text>
    <text x="126" y="274" text-anchor="middle" font-size="12.5" fill="#A9C4E8">The creator</text>
    <g text-anchor="middle" font-size="11.5" fill="#8B90A8">
      <text x="126" y="304">Runs a public persona for fans with</text>
      <text x="126" y="322">strict boundaries — private life</text>
      <text x="126" y="340">stays behind the relationship wall.</text>
    </g>
  </g>

  <!-- ===== card 4: the caregiver ===== -->
  <g transform="translate(900 110)" filter="url(#cshadow)">
    <rect width="252" height="380" rx="20" fill="url(#ccard)"/>
    <rect width="252" height="380" rx="20" fill="none" stroke="#DCB8D4" stroke-opacity="0.35" stroke-width="1.2"/>
    <g transform="translate(126 130)">
      <g filter="url(#csoft)"><circle r="56" fill="#DCB8D4" opacity="0.3"/></g>
      <circle cy="-14" r="34" fill="url(#cf4)"/>
      <path d="M-52 84 C-52 20 -27 -2 0 -2 C27 -2 52 20 52 84 Z" fill="url(#cf4)"/>
    </g>
    <text x="126" y="252" text-anchor="middle" font-size="17" font-weight="bold" fill="#F4E3C8">Priya, 45</text>
    <text x="126" y="274" text-anchor="middle" font-size="12.5" fill="#DCB8D4">The caregiver</text>
    <g text-anchor="middle" font-size="11.5" fill="#8B90A8">
      <text x="126" y="304">Pairs a companion profile with</text>
      <text x="126" y="322">Guardian monitoring for her father —</text>
      <text x="126" y="340">reassurance that escalates when real.</text>
    </g>
  </g>

  <!-- ===== card 5: the explorer ===== -->
  <g transform="translate(1180 110)" filter="url(#cshadow)">
    <rect width="252" height="380" rx="20" fill="url(#ccard)"/>
    <rect width="252" height="380" rx="20" fill="none" stroke="#B8D8C8" stroke-opacity="0.35" stroke-width="1.2"/>
    <g transform="translate(126 130)">
      <g filter="url(#csoft)"><circle r="56" fill="#B8D8C8" opacity="0.3"/></g>
      <circle cy="-14" r="34" fill="url(#cf5)"/>
      <path d="M-52 84 C-52 20 -27 -2 0 -2 C27 -2 52 20 52 84 Z" fill="url(#cf5)"/>
    </g>
    <text x="126" y="252" text-anchor="middle" font-size="17" font-weight="bold" fill="#F4E3C8">Sam, 31</text>
    <text x="126" y="274" text-anchor="middle" font-size="12.5" fill="#B8D8C8">The explorer</text>
    <g text-anchor="middle" font-size="11.5" fill="#8B90A8">
      <text x="126" y="304">Trades stories with profiles across</text>
      <text x="126" y="322">chat, web, and VR — one identity</text>
      <text x="126" y="340">follows him to every surface.</text>
    </g>
  </g>

  <rect width="1500" height="560" fill="url(#cvign)"/>
</svg>
